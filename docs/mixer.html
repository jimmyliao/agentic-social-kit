<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Mixer — Agentic Social Kit</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --line: #2a313c; --ink: #e6edf3;
    --muted: #8b949e; --accent: #58a6ff;
    --approve: #2ea043; --downgrade: #d29922; --ask: #a371f7; --deny: #f85149;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, system-ui, Segoe UI, Roboto, sans-serif;
         background: var(--bg); color: var(--ink); }
  header { padding: 14px 20px; border-bottom: 1px solid var(--line);
           display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  header h1 { font-size: 18px; margin: 0; letter-spacing: .3px; }
  header .sub { color: var(--muted); font-size: 12px; }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  button { background: #21262d; color: var(--ink); border: 1px solid var(--line);
           border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: .4; cursor: default; }
  label.toggle { display: inline-flex; align-items: center; gap: 6px; color: var(--muted);
                 font-size: 12px; }
  input[type=range] { width: 90px; }
  main { display: grid; grid-template-columns: 1fr 380px; gap: 0; height: calc(100vh - 58px); }
  #stage { position: relative; overflow: hidden; }
  #wires { position: absolute; inset: 0; width: 100%; height: 100%; }
  .node { position: absolute; transform: translate(-50%, -50%); text-align: center; width: 120px; }
  .avatar { width: 54px; height: 54px; border-radius: 50%; margin: 0 auto 6px;
            background: radial-gradient(circle at 35% 30%, #3b4a63, #1c2330);
            border: 2px solid #30363d; display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 18px; position: relative; }
  .avatar .dot { position: absolute; right: 2px; bottom: 2px; width: 11px; height: 11px;
                 border-radius: 50%; background: var(--approve); border: 2px solid var(--panel); }
  .node .name { font-weight: 600; }
  .node .traits { color: var(--muted); font-size: 11px; }
  .node.active .avatar { box-shadow: 0 0 0 3px var(--accent); }
  aside { border-left: 1px solid var(--line); background: var(--panel);
          display: flex; flex-direction: column; min-height: 0; }
  aside h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted);
             margin: 0; padding: 12px 16px; border-bottom: 1px solid var(--line); }
  #feed { overflow-y: auto; padding: 12px; flex: 1; }
  .card { background: #0d1117; border: 1px solid var(--line); border-left-width: 4px;
          border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; animation: pop .25s ease; }
  @keyframes pop { from { opacity: 0; transform: translateY(6px); } }
  .card .head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .card .who { font-weight: 600; }
  .card .who .arrow { color: var(--muted); margin: 0 5px; }
  .card .action { color: var(--accent); font-size: 12px; margin: 4px 0; }
  .card .rationale { font-style: italic; color: #c9d1d9; font-size: 12.5px; }
  .card .rel { color: var(--muted); font-size: 11px; margin-top: 6px; }
  .badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px;
           white-space: nowrap; }
  .badge.APPROVE { background: rgba(46,160,67,.18); color: #56d364; }
  .badge.DOWNGRADED { background: rgba(210,153,34,.18); color: #e3b341; }
  .badge.ASK_USER { background: rgba(163,113,247,.18); color: #c297ff; }
  .badge.DENY { background: rgba(248,81,73,.18); color: #ff7b72; }
  .gatemsg { color: var(--muted); font-size: 11px; margin-top: 5px; border-top: 1px dashed var(--line);
             padding-top: 5px; }
  .legend { padding: 8px 16px; border-top: 1px solid var(--line); color: var(--muted);
            font-size: 11px; display: flex; gap: 14px; flex-wrap: wrap; }
  .legend b { color: var(--ink); font-weight: 600; }
  .meta { color: var(--muted); font-size: 12px; }
  .src-pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--line); }
  .src-llm { color: #56d364; border-color: #2ea043; }
  .src-rule { color: #e3b341; border-color: #d29922; }
</style>
</head>
<body>
<header>
  <div>
    <h1>The Mixer</h1>
    <div class="sub">autonomous personas · every move routed through the Declarative Safety Gate</div>
  </div>
  <div class="controls">
    <button id="btnRun">▶ Run</button>
    <button id="btnStep">⤳ Step</button>
    <button id="btnReset">↺ Reset</button>
    <label class="toggle">maxIntensity <input id="maxI" type="range" min="1" max="10" value="6"><span id="maxIv">6</span></label>
    <label class="toggle"><input id="consent" type="checkbox"> requireConsent</label>
    <span id="srcPill" class="src-pill">source: —</span>
  </div>
</header>

<main>
  <section id="stage">
    <svg id="wires"></svg>
    <div class="meta" style="position:absolute;top:10px;left:14px;" id="worldMeta"></div>
  </section>
  <aside>
    <h2>Live social feed</h2>
    <div id="feed"></div>
    <div class="legend">
      <span><b>Gate:</b></span>
      <span class="badge APPROVE">APPROVE</span>
      <span class="badge DOWNGRADED">DOWNGRADED</span>
      <span class="badge ASK_USER">ASK_USER</span>
      <span class="badge DENY">DENY</span>
    </div>
    <div class="legend">
      <span><b>Bond:</b> stranger → acquaintance → friendly → walk_buddy → close (thicker/greener line)</span>
    </div>
  </aside>
</main>

<script>
// Self-contained: tries to fetch the generated turn-log; if opened via file://
// (no server) it falls back to a tiny embedded sample so the view always renders.
const EMBEDDED = {
  "scenario": "The Mixer", "engine": "embedded sample", "source": "rule",
  "world": { "place": "lounge", "timeOfDay": "evening", "maxIntensity": 6, "requireConsent": false },
  "agents": [
    { "id": "a_jordan", "name": "Jordan", "traits": ["outgoing","playful"], "energy": 8, "mood": "upbeat" },
    { "id": "a_riley", "name": "Riley", "traits": ["outgoing","curious"], "energy": 7, "mood": null },
    { "id": "a_quinn", "name": "Quinn", "traits": ["shy","reserved"], "energy": 2, "mood": "quiet" },
    { "id": "a_sasha", "name": "Sasha", "traits": ["calm","gentle","curious"], "energy": 4, "mood": null },
    { "id": "a_theo", "name": "Theo", "traits": ["playful","bold"], "energy": 9, "mood": null }
  ],
  "turns": [
    { "turn": 1, "events": [
      { "actor": "a_jordan", "target": "a_riley", "type": "visit", "intensity": 8,
        "suggestedAction": "Set up a lounge hangout this evening",
        "rationale": "Jordan and Riley share energy/traits; propose an active meetup at the lounge.",
        "decision": "DOWNGRADED (orig DENY) -> APPROVE", "badge": "DOWNGRADED",
        "gateMessage": "original 'visit' (intensity 8) denied: Denied by policy 'cap_intensity'; downgraded to 'leave_a_note'.",
        "relationshipBefore": "stranger(0)", "relationshipAfter": "stranger(1)" },
      { "actor": "a_quinn", "target": "a_sasha", "type": "gentle_intro", "intensity": 3,
        "suggestedAction": "Wave hello at the lounge",
        "rationale": "Quinn reads as low-energy/reserved; start light at the lounge.",
        "decision": "APPROVE", "badge": "APPROVE", "gateMessage": "",
        "relationshipBefore": "stranger(0)", "relationshipAfter": "stranger(1)" }
    ]}
  ]
};

let DATA = EMBEDDED;
const stage = document.getElementById('stage');
const wires = document.getElementById('wires');
const feed = document.getElementById('feed');
const worldMeta = document.getElementById('worldMeta');
const srcPill = document.getElementById('srcPill');

let nodes = {};      // id -> {el, x, y}
let flat = [];       // flattened event list across turns
let cursor = 0;      // how many events have been played
let bonds = {};      // "a|b" -> latest stage string

const STAGES = ["stranger","acquaintance","friendly","walk_buddy","close"];
function stageOf(relStr){ const m = /^([a-z_]+)/.exec(relStr||""); return m ? m[1] : "stranger"; }
function stageIdx(s){ const i = STAGES.indexOf(s); return i < 0 ? 0 : i; }

function layoutNodes() {
  stage.querySelectorAll('.node').forEach(n => n.remove());
  nodes = {};
  const rect = stage.getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  const R = Math.min(rect.width, rect.height) * 0.34;
  const A = DATA.agents;
  A.forEach((a, i) => {
    const ang = (-Math.PI / 2) + (2 * Math.PI * i / A.length);
    const x = cx + R * Math.cos(ang), y = cy + R * Math.sin(ang);
    const el = document.createElement('div');
    el.className = 'node'; el.id = 'node-' + a.id;
    el.style.left = x + 'px'; el.style.top = y + 'px';
    el.innerHTML = `<div class="avatar">${a.name[0]}<span class="dot"></span></div>
      <div class="name">${a.name}</div>
      <div class="traits">${(a.traits||[]).join(' · ')}</div>`;
    stage.appendChild(el);
    nodes[a.id] = { el, x, y };
  });
}

function bondColor(idx){
  return ["#3d4757","#5a6e8c","#3f7d8c","#2f9e6f","#2ea043"][idx] || "#3d4757";
}
function drawWires() {
  wires.innerHTML = '';
  Object.entries(bonds).forEach(([key, stg]) => {
    const [a, b] = key.split('|');
    if (!nodes[a] || !nodes[b]) return;
    const idx = stageIdx(stg);
    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ln.setAttribute('x1', nodes[a].x); ln.setAttribute('y1', nodes[a].y);
    ln.setAttribute('x2', nodes[b].x); ln.setAttribute('y2', nodes[b].y);
    ln.setAttribute('stroke', bondColor(idx));
    ln.setAttribute('stroke-width', 1 + idx * 1.6);
    ln.setAttribute('stroke-opacity', 0.85);
    wires.appendChild(ln);
  });
}

function renderCard(ev) {
  const A = DATA.agents.find(x => x.id === ev.actor) || { name: ev.actor };
  const T = DATA.agents.find(x => x.id === ev.target) || { name: ev.target };
  const color = { APPROVE:'var(--approve)', DOWNGRADED:'var(--downgrade)',
                  ASK_USER:'var(--ask)', DENY:'var(--deny)' }[ev.badge] || 'var(--line)';
  const icon = { APPROVE:'✅', DOWNGRADED:'↓', ASK_USER:'🔒', DENY:'⛔' }[ev.badge] || '';
  const card = document.createElement('div');
  card.className = 'card';
  card.style.borderLeftColor = color;
  card.innerHTML = `
    <div class="head">
      <div class="who">${A.name}<span class="arrow">→</span>${T.name}</div>
      <span class="badge ${ev.badge}">${icon} ${ev.badge}</span>
    </div>
    <div class="action">${ev.type} · intensity ${ev.intensity} — ${ev.suggestedAction||''}</div>
    <div class="rationale">“${ev.rationale||''}”</div>
    <div class="rel">bond: ${ev.relationshipBefore} → ${ev.relationshipAfter}</div>
    ${ev.gateMessage ? `<div class="gatemsg">gate: ${ev.gateMessage}</div>` : ''}`;
  feed.prepend(card);
}

function playOne() {
  if (cursor >= flat.length) return false;
  const ev = flat[cursor++];
  // highlight actor
  Object.values(nodes).forEach(n => n.el.classList.remove('active'));
  if (nodes[ev.actor]) nodes[ev.actor].el.classList.add('active');
  // bond line uses the *after* stage; only strengthen-y outcomes move it
  const key = [ev.actor, ev.target].sort().join('|');
  bonds[key] = stageOf(ev.relationshipAfter);
  drawWires();
  renderCard(ev);
  return true;
}

function reset() {
  feed.innerHTML = ''; bonds = {}; cursor = 0;
  Object.values(nodes).forEach(n => n.el.classList.remove('active'));
  drawWires();
}

let running = null;
function run() {
  if (running) { clearInterval(running); running = null; document.getElementById('btnRun').textContent = '▶ Run'; return; }
  document.getElementById('btnRun').textContent = '⏸ Pause';
  running = setInterval(() => { if (!playOne()) { clearInterval(running); running = null; document.getElementById('btnRun').textContent='▶ Run'; } }, 700);
}

function applyData() {
  flat = [];
  (DATA.turns || []).forEach(t => (t.events || []).forEach(e => flat.push({ ...e, turn: t.turn })));
  worldMeta.textContent = `venue: ${DATA.world.place} · ${DATA.world.timeOfDay}  ·  engine: ${DATA.engine}`;
  srcPill.textContent = 'source: ' + DATA.source;
  srcPill.className = 'src-pill ' + (DATA.source === 'llm' ? 'src-llm' : 'src-rule');
  document.getElementById('maxI').value = DATA.world.maxIntensity;
  document.getElementById('maxIv').textContent = DATA.world.maxIntensity;
  document.getElementById('consent').checked = !!DATA.world.requireConsent;
  layoutNodes(); reset();
}

document.getElementById('btnRun').onclick = run;
document.getElementById('btnStep').onclick = () => { if (running){clearInterval(running);running=null;document.getElementById('btnRun').textContent='▶ Run';} playOne(); };
document.getElementById('btnReset').onclick = reset;
document.getElementById('maxI').oninput = e => document.getElementById('maxIv').textContent = e.target.value;
window.addEventListener('resize', () => { layoutNodes(); drawWires(); });

// The toggles let you preview a re-run config; the engine itself runs in Python.
// (They are surfaced here so the safety knobs are visible in the demo.)
fetch('turn-log.json').then(r => r.ok ? r.json() : Promise.reject())
  .then(j => { DATA = j; applyData(); })
  .catch(() => { DATA = EMBEDDED; applyData(); });
</script>
</body>
</html>
