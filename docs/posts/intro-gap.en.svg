<svg xmlns="http://www.w3.org/2000/svg" width="860" height="320" viewBox="0 0 860 320" font-family="-apple-system, 'Helvetica Neue', sans-serif">
  <rect width="860" height="320" fill="#ffffff"/>

  <!-- Stage 1: single Agent -->
  <g>
    <rect x="40" y="120" width="160" height="80" rx="10" fill="#ffffff" stroke="#2563EB" stroke-width="2"/>
    <circle cx="90" cy="160" r="16" fill="#2563EB"/>
    <text x="118" y="155" font-size="15" fill="#1f2937" font-weight="600">A single</text>
    <text x="118" y="175" font-size="15" fill="#1f2937" font-weight="600">Agent</text>
    <text x="120" y="232" font-size="12" fill="#6b7280" text-anchor="middle">You call it, it acts</text>
  </g>

  <!-- arrow 1 -->
  <line x1="210" y1="160" x2="270" y2="160" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: Agent team -->
  <g>
    <rect x="280" y="90" width="200" height="140" rx="10" fill="#ffffff" stroke="#2563EB" stroke-width="2"/>
    <circle cx="330" cy="130" r="13" fill="#2563EB"/>
    <circle cx="390" cy="120" r="13" fill="#2563EB"/>
    <circle cx="430" cy="155" r="13" fill="#2563EB"/>
    <circle cx="350" cy="185" r="13" fill="#2563EB"/>
    <line x1="330" y1="130" x2="390" y2="120" stroke="#93c5fd" stroke-width="2"/>
    <line x1="390" y1="120" x2="430" y2="155" stroke="#93c5fd" stroke-width="2"/>
    <line x1="430" y1="155" x2="350" y2="185" stroke="#93c5fd" stroke-width="2"/>
    <line x1="350" y1="185" x2="330" y2="130" stroke="#93c5fd" stroke-width="2"/>
    <text x="380" y="262" font-size="12" fill="#6b7280" text-anchor="middle">A team of agents: talking to each other, and to people</text>
  </g>

  <!-- arrow 2 -->
  <line x1="490" y1="160" x2="550" y2="160" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: the missing governance gate -->
  <g>
    <rect x="560" y="90" width="260" height="140" rx="10" fill="#eff6ff" stroke="#2563EB" stroke-width="3" stroke-dasharray="8 5"/>
    <text x="690" y="135" font-size="17" fill="#2563EB" text-anchor="middle" font-weight="700">The missing layer</text>
    <text x="690" y="165" font-size="15" fill="#1f2937" text-anchor="middle" font-weight="600">Governance Gate · Safety Gate</text>
    <text x="690" y="195" font-size="12" fill="#6b7280" text-anchor="middle">APPROVE / DENY</text>
    <text x="690" y="213" font-size="12" fill="#6b7280" text-anchor="middle">DOWNGRADE / ASK_USER</text>
    <text x="690" y="262" font-size="12" fill="#6b7280" text-anchor="middle">Every framework leaves this layer to you</text>
  </g>

  <text x="430" y="40" font-size="18" fill="#111827" text-anchor="middle" font-weight="700">From one Agent → a team → the gate nobody attached</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>
</svg>
