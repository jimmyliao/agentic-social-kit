<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" font-family="-apple-system, 'Helvetica Neue', sans-serif">
  <rect width="900" height="360" fill="#ffffff"/>

  <text x="450" y="38" font-size="18" fill="#111827" text-anchor="middle" font-weight="700">The pre-tool-call control point: the gate fires before the action happens</text>

  <!-- Engine proposes -->
  <g>
    <rect x="30" y="140" width="180" height="80" rx="10" fill="#ffffff" stroke="#2563EB" stroke-width="2"/>
    <text x="120" y="170" font-size="15" fill="#1f2937" text-anchor="middle" font-weight="600">Engine</text>
    <text x="120" y="192" font-size="13" fill="#6b7280" text-anchor="middle">proposes an action</text>
    <text x="120" y="246" font-size="12" fill="#9ca3af" text-anchor="middle">"Toast with Theo (5)"</text>
  </g>

  <!-- arrow into gate -->
  <line x1="212" y1="180" x2="280" y2="180" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- The Gate -->
  <g>
    <rect x="285" y="120" width="190" height="120" rx="12" fill="#eff6ff" stroke="#2563EB" stroke-width="3"/>
    <text x="380" y="170" font-size="17" fill="#2563EB" text-anchor="middle" font-weight="700">Safety Gate</text>
    <text x="380" y="196" font-size="13" fill="#1f2937" text-anchor="middle">policy.enforce(...)</text>
    <text x="380" y="262" font-size="12" fill="#9ca3af" text-anchor="middle">declarative policy · fail-closed</text>
  </g>

  <!-- four verdict arrows -->
  <line x1="477" y1="135" x2="560" y2="95" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="477" y1="162" x2="560" y2="152" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="477" y1="198" x2="560" y2="208" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="477" y1="225" x2="560" y2="265" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- verdicts -->
  <g font-size="14" font-weight="700">
    <rect x="565" y="76" width="300" height="38" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="585" y="100" fill="#16a34a">APPROVE</text>
    <text x="690" y="100" font-size="12" font-weight="400" fill="#6b7280">let it through, as is</text>

    <rect x="565" y="124" width="300" height="38" rx="8" fill="#ffffff" stroke="#2563EB" stroke-width="2"/>
    <text x="585" y="148" fill="#2563EB">ASK_USER</text>
    <text x="690" y="148" font-size="12" font-weight="400" fill="#6b7280">escalate to a human</text>

    <rect x="565" y="190" width="300" height="38" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="585" y="214" fill="#d97706">&#8595; DOWNGRADE</text>
    <text x="720" y="214" font-size="12" font-weight="400" fill="#6b7280">retry, softened</text>

    <rect x="565" y="246" width="300" height="38" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="585" y="270" fill="#dc2626">DENY</text>
    <text x="690" y="270" font-size="12" font-weight="400" fill="#6b7280">blocked, never executes</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>
</svg>
